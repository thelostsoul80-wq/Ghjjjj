<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok Enterprise Node - Remix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
        }
        
        .app-overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, #0a1a05 0%, #000 100%); z-index: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .modal-animate { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .content-container {
            position: relative;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            border-radius: 40px 40px 0 0;
            border-top: 2px solid rgba(110, 235, 54, 0.5);
            box-shadow: 0 -20px 60px rgba(0,0,0,1);
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
            overflow: hidden;
            margin-top: -60px;
        }

        .content-inner {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .remix-input {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(110, 235, 54, 0.3);
            color: #fff;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }

        .ui-btn {
            box-sizing: border-box;
            padding: 22px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(110, 235, 54, 0.8);
            font-weight: 900;
            font-size: 13px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(110, 235, 54, 0.4);
            cursor: not-allowed;
            transition: 0.4s;
            overflow: hidden;
            border-radius: 24px;
            width: 100%;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
        }

        .ui-btn.ready {
            cursor: pointer;
            background: #6EEB36;
            color: #000;
            border-color: #6EEB36;
            box-shadow: 0 15px 35px rgba(110, 235, 54, 0.5);
        }

        /* Wallet Modal Styles */
        #walletModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-card {
            background: #0a0a0a;
            border: 1px solid rgba(110, 235, 54, 0.4);
            border-radius: 32px;
            width: 100%;
            max-width: 400px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .eth-icon {
            filter: drop-shadow(0 0 8px #6EEB36);
        }

        .erc-icon {
            width: 28px;
            height: 28px;
            object-fit: contain;
            filter: drop-shadow(0 0 5px #6EEB36);
        }
    </style>
</head>
<body class="fixed inset-0">

    <div class="app-overlay"></div>

    <!-- Loading Screen -->
    <div id="loadingOverlay" class="loading-overlay">
        <img src="erc.gif" class="w-16 h-16 mb-6" alt="Kernel">
        <div class="text-[#6EEB36] text-[11px] font-black tracking-[0.5em] uppercase mb-8 text-center">Synchronizing Remix Kernel...</div>
        <div class="w-56 h-[2px] bg-white/5 rounded-full overflow-hidden">
            <div id="progressBar" class="h-full bg-[#6EEB36] shadow-[0_0_15px_#6EEB36] transition-all duration-300 w-0"></div>
        </div>
    </div>

    <!-- Wallet & Platform Modal -->
    <div id="walletModal">
        <div class="modal-card modal-animate">
            <h3 class="text-[#6EEB36] font-black text-center text-sm tracking-[0.3em] uppercase mb-6">Initialize Node Connection</h3>
            
            <div class="space-y-5">
                <!-- Platform Selection -->
                <div class="relative">
                    <label class="text-[9px] font-black text-[#6EEB36] uppercase tracking-[0.2em] mb-2 block">Enterprise Source</label>
                    <button id="platformBtn" class="w-full remix-input rounded-xl p-4 flex items-center justify-between text-left">
                        <span id="platformText" class="text-[12px] font-bold text-zinc-400 uppercase">Select Access Point</span>
                        <svg id="platformArrow" class="text-[#6EEB36] transition-transform" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </button>
                    <div id="platformMenu" class="hidden absolute top-full left-0 right-0 mt-2 bg-[#0c0c0c] border border-[#6EEB36]/40 rounded-xl shadow-2xl z-[1100] max-h-[160px] overflow-y-auto no-scrollbar p-1"></div>
                </div>

                <!-- Wallet Address -->
                <div class="relative">
                    <label class="text-[9px] font-black text-[#6EEB36] uppercase tracking-[0.2em] mb-2 block">Recipient Wallet Address (ERC20)</label>
                    <div class="relative">
                        <input id="walletInput" type="text" placeholder="0x..." class="w-full remix-input rounded-xl p-4 pr-12 text-[12px] font-mono outline-none focus:border-[#6EEB36]">
                        <div class="absolute right-4 top-1/2 -translate-y-1/2">
                            <svg class="eth-icon text-[#6EEB36]" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M12 2L4.5 12L12 22L19.5 12L12 2Z"></path>
                                <path d="M12 2L12 22"></path>
                                <path d="M4.5 12L19.5 12"></path>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Warning -->
                <div class="bg-red-950/30 border border-red-500/50 p-3 rounded-xl">
                    <p class="text-[9px] text-red-400 font-bold leading-relaxed text-center uppercase tracking-tighter">
                        تنويه: استخدام عنوان شبكة خاطئ يسبب خسارة الأصول (Loss of Assets) بشكل نهائي. تأكد من أن العنوان يدعم شبكة ERC20.
                    </p>
                </div>

                <button id="confirmWalletBtn" class="w-full bg-[#6EEB36] text-black rounded-xl p-4 text-[12px] font-black uppercase tracking-widest active:scale-95 transition-all shadow-[0_10px_30px_rgba(110,235,54,0.3)]">
                    Sync Node Now
                </button>
                
                <button id="closeModalBtn" class="w-full text-zinc-500 text-[9px] font-bold uppercase tracking-widest pt-2">Cancel Connection</button>
            </div>
        </div>
    </div>

    <!-- Main Wrapper -->
    <div class="flex-1 flex flex-col relative z-10 w-full h-full">
        
        <!-- Header -->
        <header class="flex flex-col items-center pt-8 pb-4 px-6">
            <div class="relative">
                <div class="w-32 h-32 rounded-[40px] p-[3px] bg-gradient-to-br from-[#6EEB36] to-black border border-white/10 mb-2 shadow-[0_0_50px_rgba(110,235,54,0.4)] overflow-hidden">
                    <img id="userPhoto" src="https://ui-avatars.com/api/?name=Remix&background=000&color=6EEB36" class="w-full h-full rounded-[37px] object-cover" alt="Profile">
                </div>
                <div class="absolute bottom-2 -right-1 w-8 h-8 bg-[#6EEB36] rounded-full border-4 border-black flex items-center justify-center z-10">
                    <div class="w-3 h-3 bg-black rounded-full animate-pulse"></div>
                </div>
            </div>
            <div class="z-20 text-center">
                <h2 id="userName" class="text-white text-[15px] font-black tracking-[0.3em] uppercase mb-1">REMIX NODE</h2>
                <div class="px-5 py-1.5 bg-[#6EEB36]/10 border border-[#6EEB36]/30 backdrop-blur-2xl rounded-full inline-block">
                    <span id="userId" class="text-[#6EEB36] font-mono text-[9px] tracking-widest uppercase">KRNL-0.54.0</span>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div class="content-container">
            <div class="content-inner">
                <div class="flex-1 space-y-8 overflow-y-auto no-scrollbar pt-6">
                    
                    <!-- Network Status (Static Info) -->
                    <div>
                        <label class="text-[10px] font-black text-[#6EEB36] uppercase tracking-[0.25em] ml-1 mb-3 block">Protocol Layer</label>
                        <div class="w-full remix-input border-[#6EEB36]/50 rounded-2xl p-5 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <img src="erc.gif" class="erc-icon" alt="ERC">
                                <span class="text-[13px] font-black text-[#6EEB36] uppercase tracking-[0.2em]">ETH ERC20 REMIX</span>
                            </div>
                            <span class="text-[9px] bg-[#6EEB36] text-black px-2 py-1 rounded font-black tracking-tighter">SECURE</span>
                        </div>
                    </div>

                    <!-- Connect Wallet Trigger -->
                    <div>
                        <label class="text-[10px] font-black text-[#6EEB36] uppercase tracking-[0.25em] ml-1 mb-3 block">Node Access</label>
                        <button id="openModalBtn" class="w-full bg-[#6EEB36] text-black rounded-2xl p-5 text-[14px] font-black uppercase tracking-[0.2em] flex items-center justify-center gap-3 shadow-[0_12px_40px_rgba(110,235,54,0.4)] active:scale-[0.96] transition-all">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4M4 6v12c0 1.1.9 2 2 2h14v-4M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></svg>
                            Connect Wallet
                        </button>
                    </div>

                    <!-- Volume Selection -->
                    <div class="relative">
                        <label class="text-[10px] font-black text-[#6EEB36] uppercase tracking-[0.25em] ml-1 mb-3 block">Allocation Volume</label>
                        <button id="amountBtn" class="w-full remix-input rounded-2xl p-5 flex items-center justify-between">
                            <span id="amountText" class="text-[13px] font-bold text-white uppercase tracking-tight">Select Volume</span>
                            <svg id="amountArrow" class="text-[#6EEB36] transition-transform" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                        <div id="amountMenu" class="hidden absolute bottom-full mb-3 left-0 right-0 bg-[#0c0c0c] border border-[#6EEB36]/40 rounded-2xl shadow-2xl z-50 max-h-[220px] overflow-y-auto no-scrollbar p-2"></div>
                    </div>
                </div>

                <!-- Action Button -->
                <div class="pt-6 mt-auto">
                    <button id="authorizeBtn" disabled class="ui-btn">
                        <span>CALLING SMARTCONTRACT</span>
                    </button>
                    <div class="text-center mt-4">
                        <div class="text-[#6EEB36] font-black text-[10px] uppercase tracking-[0.7em] opacity-80">REMIX ENGINE</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let selectedPlatform = null, selectedAmount = null, walletConnected = false;
        let walletAddress = "";

        const platforms = [
            { n: 'Binance', i: 'https://cryptologos.cc/logos/binance-coin-bnb-logo.png' },
            { n: 'Trust Wallet', i: 'https://trustwallet.com/assets/images/media/assets/trust_platform.png' },
            { n: 'MetaMask', i: 'https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg' },
            { n: 'Bybit', i: 'https://cryptologos.cc/logos/bybit-bit-logo.png' }
        ];
        const amounts = [100, 150, 300, 500, 1000, 2000, 3000, 4000, 5000];

        // User Setup
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('userName').textContent = (user.first_name + ' ' + (user.last_name || '')).toUpperCase();
            if (user.photo_url) document.getElementById('userPhoto').src = user.photo_url;
        }

        // Modal Controls
        const modal = document.getElementById('walletModal');
        document.getElementById('openModalBtn').onclick = () => {
            if(walletConnected) return;
            modal.style.display = 'flex';
        };
        document.getElementById('closeModalBtn').onclick = () => modal.style.display = 'none';

        // Setup Platform Dropdown inside Modal
        const platformBtn = document.getElementById('platformBtn');
        const platformMenu = document.getElementById('platformMenu');
        platformBtn.onclick = (e) => {
            e.stopPropagation();
            platformMenu.classList.toggle('hidden');
            document.getElementById('platformArrow').classList.toggle('rotate-180');
        };

        platforms.forEach(p => {
            const div = document.createElement('div');
            div.className = 'flex items-center gap-3 p-3 hover:bg-[#6EEB36]/20 rounded-lg cursor-pointer transition-colors';
            div.innerHTML = `<img src="${p.i}" class="w-5 h-5 object-contain"> <span class="text-[11px] font-bold text-white uppercase">${p.n}</span>`;
            div.onclick = (e) => {
                e.stopPropagation();
                selectedPlatform = p;
                document.getElementById('platformText').innerHTML = `<img src="${p.i}" class="w-4 h-4 inline-block mr-2"><span class="text-[#6EEB36] font-black">${p.n}</span>`;
                platformMenu.classList.add('hidden');
                document.getElementById('platformArrow').classList.remove('rotate-180');
            };
            platformMenu.appendChild(div);
        });

        // Amount Selection
        const amountBtn = document.getElementById('amountBtn');
        const amountMenu = document.getElementById('amountMenu');
        amountBtn.onclick = (e) => {
            e.stopPropagation();
            amountMenu.classList.toggle('hidden');
            document.getElementById('amountArrow').classList.toggle('rotate-180');
        };

        amounts.forEach(a => {
            const div = document.createElement('div');
            div.className = 'flex items-center gap-4 p-4 hover:bg-[#6EEB36]/20 rounded-xl cursor-pointer transition-colors mb-1';
            div.innerHTML = `<div class="w-6 h-6 flex items-center justify-center bg-[#6EEB36]/20 rounded-full text-[10px] text-[#6EEB36] font-bold">$</div> <span class="text-[12px] font-bold text-white uppercase">${a} USDT</span>`;
            div.onclick = (e) => {
                e.stopPropagation();
                selectedAmount = a;
                document.getElementById('amountText').innerHTML = `<span class="text-[#6EEB36] font-black tracking-widest">${a} USDT</span>`;
                amountMenu.classList.add('hidden');
                document.getElementById('amountArrow').classList.remove('rotate-180');
                validate();
            };
            amountMenu.appendChild(div);
        });

        // Wallet Confirmation
        document.getElementById('confirmWalletBtn').onclick = function() {
            walletAddress = document.getElementById('walletInput').value.trim();
            if (!selectedPlatform) { alert("Please select a platform first."); return; }
            if (walletAddress.length < 20) { alert("Please enter a valid ERC20 address."); return; }
            
            this.innerHTML = `<svg class="animate-spin mx-auto" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 2v4m0 12v4M4.9 4.9l2.8 2.8m8.6 8.6l2.8 2.8"/></svg>`;
            
            setTimeout(() => {
                walletConnected = true;
                modal.style.display = 'none';
                const openBtn = document.getElementById('openModalBtn');
                openBtn.className = "w-full bg-black border-2 border-[#6EEB36] text-[#6EEB36] rounded-2xl p-5 text-[14px] font-black uppercase tracking-[0.2em] flex items-center justify-center gap-3 shadow-[0_0_20px_rgba(110,235,54,0.2)]";
                openBtn.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polyline points="20 6 9 17 4 12"></polyline></svg> KERNEL READY`;
                validate();
            }, 1500);
        };

        function validate() {
            if (selectedAmount && walletConnected) {
                const btn = document.getElementById('authorizeBtn');
                btn.disabled = false;
                btn.classList.add('ready');
            }
        }

        // Final Action
        document.getElementById('authorizeBtn').onclick = function() {
            if (this.disabled) return;
            const overlay = document.getElementById('loadingOverlay');
            const bar = document.getElementById('progressBar');
            overlay.style.display = 'flex';
            let p = 0;
            const interval = setInterval(() => {
                p += 2.5; bar.style.width = p + '%';
                if (p >= 100) {
                    clearInterval(interval);
                    const map = { 100: "12.html", 150: "15.html", 300: "25.html", 500: "40.html", 1000: "80.html", 2000: "150.html", 3000: "220.html", 4000: "300.html", 5000: "400.html" };
                    window.location.href = map[selectedAmount] || "index.html";
                }
            }, 30);
        };

        window.onclick = () => {
            platformMenu.classList.add('hidden');
            amountMenu.classList.add('hidden');
        };
    </script>
</body>
</html>
